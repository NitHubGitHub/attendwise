<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111827;
            color:white;
            min-height:100vh;
            padding:40px;
        }

        .container{
            width:100%;
            max-width:1200px;
            margin:auto;
        }

        .title{
            text-align:center;
            margin-bottom:40px;
        }

        .title h1{
            font-size:42px;
            margin-bottom:10px;
        }

        .title p{
            color:#9CA3AF;
            font-size:18px;
        }

        .login-box{
            width:100%;
            max-width:450px;
            background:#1F2937;
            margin:auto;
            padding:35px;
            border-radius:20px;
            margin-bottom:50px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.4);
        }

        .login-box h2{
            margin-bottom:25px;
            text-align:center;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#D1D5DB;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#374151;
            color:white;
            font-size:16px;
        }

        .input-group input:focus{
            outline:none;
            border:2px solid #3B82F6;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563EB;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#1D4ED8;
        }

        .feedback-button{
            position:fixed;
            bottom:20px;
            left:20px;
            background:#2563EB;
            color:white;
            padding:14px 18px;
            border-radius:14px;
            cursor:pointer;
            box-shadow:0px 8px 25px rgba(0,0,0,0.4);
            z-index:999;
            transition:0.3s;
        }

        .feedback-button:hover{
            background:#1D4ED8;
            transform:translateY(-2px);
        }

        .feedback-popup{
            position:fixed;
            bottom:80px;
            left:20px;
            width:320px;
            background:#1F2937;
            border-radius:18px;
            padding:20px;
            box-shadow:0px 10px 35px rgba(0,0,0,0.5);
            display:none;
            z-index:1000;
        }

        .feedback-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
        }

        .feedback-header button{
            background:none;
            border:none;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .feedback-text{
            color:#D1D5DB;
            margin-bottom:15px;
            font-size:14px;
            line-height:1.5;
        }

        .feedback-popup textarea{
            width:100%;
            background:#374151;
            border:none;
            border-radius:10px;
            padding:12px;
            color:white;
            margin-bottom:15px;
            font-size:14px;
            height:120px;
            resize:none;
        }

        .feedback-popup textarea:focus{
            outline:none;
            border:2px solid #3B82F6;
        }

        .feedback-popup button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563EB;
            color:white;
            cursor:pointer;
            font-size:15px;
            transition:0.3s;
        }

        .feedback-popup button:hover{
            background:#1D4ED8;
        }

        #feedbackStatus{
            margin-top:12px;
            text-align:center;
            color:#10B981;
            font-size:14px;
        }

        #loadingOverlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#111827;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:99999;
        }

        .loader-box{
            text-align:center;
        }

        .spinner{
            width:70px;
            height:70px;
            border:6px solid #374151;
            border-top:6px solid #3B82F6;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:auto;
            margin-bottom:25px;
        }

        @keyframes spin{
            0%{
                transform:rotate(0deg);
            }

            100%{
                transform:rotate(360deg);
            }
        }

        #loadingText{
            color:white;
            font-size:24px;
            font-weight:600;
        }

        @media(max-width:600px){

            body{
                padding:20px;
            }

            .title h1{
                font-size:32px;
            }

            .feedback-popup{
                width:90%;
                left:5%;
            }

            .feedback-button{
                left:15px;
                bottom:15px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="title">
            <h1>Attendance Analyzer</h1>
            <p>
                Track your attendance and safe bunk limits instantly.
            </p>
        </div>

        <form class="login-box" method="POST" action="/analyze">

            <h2>Login</h2>

            <div class="input-group">
                <label>Roll Number</label>

                <input 
                    type="text"
                    name="email"
                    placeholder="Enter Roll Number"
                    required
                >
            </div>

            <div class="input-group">
                <label>Password / DOB</label>

                <input 
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >
            </div>

            <button class="btn">
                Analyze Attendance
            </button>

        </form>

    </div>

    <div class="feedback-button" onclick="openFeedback()">
        💬 Feedback
    </div>

    <div class="feedback-popup" id="feedbackPopup">

        <div class="feedback-header">

            <h3>Anonymous Feedback</h3>

            <button onclick="closeFeedback()">
                ✕
            </button>

        </div>

        <p class="feedback-text">
            Your feedback can help make this site better.
        </p>

        <textarea
            id="feedbackMessage"
            placeholder="Enter feedback..."
        ></textarea>

        <button onclick="submitFeedback()">
            Send Feedback
        </button>

        <div id="feedbackStatus"></div>

    </div>

    <div id="loadingOverlay">

        <div class="loader-box">

            <div class="spinner"></div>

            <h2 id="loadingText">
                Loading...
            </h2>

        </div>

    </div>

    <script>

    function openFeedback(){

        document.getElementById(
            "feedbackPopup"
        ).style.display = "block";
    }

    function closeFeedback(){

        document.getElementById(
            "feedbackPopup"
        ).style.display = "none";
    }

    async function submitFeedback(){

        const message = document.getElementById(
            "feedbackMessage"
        ).value;

        const status = document.getElementById(
            "feedbackStatus"
        );

        if(message.trim() === ""){

            status.innerHTML =
            "Please enter feedback.";

            status.style.color = "#EF4444";

            return;
        }

        const formData = new FormData();

        formData.append(
            "message",
            message
        );

        try{

            const response = await fetch(
                "/feedback",
                {
                    method:"POST",
                    body:formData
                }
            );

            const data = await response.json();

            if(data.success){

                status.innerHTML =
                "Feedback submitted ❤️";

                status.style.color = "#10B981";

                document.getElementById(
                    "feedbackMessage"
                ).value = "";

                setTimeout(() => {

                    closeFeedback();

                    status.innerHTML = "";

                }, 1500);

            }else{

                status.innerHTML =
                "Failed to submit feedback.";

                status.style.color = "#EF4444";
            }

        }catch(error){

            status.innerHTML =
            "Something went wrong.";

            status.style.color = "#EF4444";
        }
    }

    document.querySelector("form")
    .addEventListener(
        "submit",
        function(){

            const overlay = document.getElementById(
                "loadingOverlay"
            );

            const loadingText = document.getElementById(
                "loadingText"
            );

            overlay.style.display = "flex";

            loadingText.innerHTML =
            "Loading...";

            setTimeout(() => {

                loadingText.innerHTML =
                "Logging into your account...";

            }, 1200);

            setTimeout(() => {

                loadingText.innerHTML =
                "Scraping your attendance data...";

            }, 2800);

        }
    );

    </script>

</body>
</html>
